name: Judge

on:
  push:
    branches: [ main ]
    paths:
      - 'solution.cpp'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  judge:
    runs-on: ubuntu-latest
    env:
      TL: 2
      ML_KB: 262144

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check whether solution was actually edited
        id: edited
        shell: bash
        run: |
          if cmp -s solution.cpp do_not_modify.cpp; then
            echo "edited=false" >> "$GITHUB_OUTPUT"
          else
            echo "edited=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop if still skeleton
        if: steps.edited.outputs.edited != 'true'
        shell: bash
        run: |
          echo "solution.cpp is not modified. Skipping judge." | tee judge_detail.txt
          echo "SKIPPED" > result.txt

      - name: Compile solution
        if: steps.edited.outputs.edited == 'true'
        id: compile
        shell: bash
        run: |
          set +e
          g++ -std=c++17 -O2 -pipe solution.cpp -o solution 2> compile.log
          status=$?
          set -e

          if [ "$status" -ne 0 ]; then
            echo "CE" > result.txt
            cp compile.log judge_detail.txt
            exit 0
          fi

      - name: Run judge
        if: steps.edited.outputs.edited == 'true'
        shell: bash
        run: |
          python3 <<'PY'
          import glob
          import os
          import subprocess
          import sys

          TL = int(os.environ.get("TL", "2"))
          ML_KB = int(os.environ.get("ML_KB", "262144"))
          result = "AC"
          details = []

          inputs = sorted(glob.glob("tests/input*.txt"))
          if not inputs:
              with open("result.txt", "w", encoding="utf-8") as f:
                  f.write("RE\n")
              with open("judge_detail.txt", "w", encoding="utf-8") as f:
                  f.write("No tests/input*.txt files found.\n")
              sys.exit(0)

          for input_path in inputs:
              suffix = os.path.basename(input_path)[5:-4]
              output_path = f"tests/output{suffix}.txt"
              if not os.path.exists(output_path):
                  result = "RE"
                  details.append(f"Case {suffix}: missing {output_path}")
                  break

              user_output = f"user_output{suffix}.txt"
              metrics = f"metrics{suffix}.txt"
              cmd = (
                  f"/usr/bin/time -f '__TIME__=%e\\n__MEM__=%M' "
                  f"timeout -k 1s {TL}s prlimit --as={ML_KB * 1024} -- ./solution "
                  f"< '{input_path}' > '{user_output}' 2> '{metrics}'"
              )
              proc = subprocess.run(cmd, shell=True, executable="/bin/bash")
              status = proc.returncode

              metric_text = ""
              if os.path.exists(metrics):
                  with open(metrics, "r", encoding="utf-8", errors="replace") as f:
                      metric_text = f.read()

              mem_kb = None
              time_s = None
              for line in metric_text.splitlines():
                  if line.startswith("__TIME__="):
                      try:
                          time_s = float(line.split("=", 1)[1])
                      except ValueError:
                          pass
                  elif line.startswith("__MEM__="):
                      try:
                          mem_kb = int(line.split("=", 1)[1])
                      except ValueError:
                          pass

              if status == 124:
                  result = "TLE"
                  details.append(f"Case {suffix}: TLE (>{TL}s)")
                  break

              if status != 0:
                  lowered = metric_text.lower()
                  if status in (137, 139) or "memory" in lowered or "cannot allocate" in lowered or "bad_alloc" in lowered:
                      result = "MLE"
                      details.append(f"Case {suffix}: MLE")
                  else:
                      result = "RE"
                      details.append(f"Case {suffix}: RE (exit code {status})")
                  break

              if mem_kb is not None and mem_kb > ML_KB:
                  result = "MLE"
                  details.append(f"Case {suffix}: MLE ({mem_kb} KB > {ML_KB} KB)")
                  break

              diff_proc = subprocess.run(
                  ["diff", "-Z", user_output, output_path],
                  stdout=subprocess.PIPE,
                  stderr=subprocess.STDOUT,
                  text=True,
              )
              if diff_proc.returncode != 0:
                  result = "WA"
                  details.append(f"Case {suffix}: WA")
                  if diff_proc.stdout:
                      details.append(diff_proc.stdout[:4000])
                  break

              details.append(
                  f"Case {suffix}: AC"
                  + (f", time={time_s:.3f}s" if time_s is not None else "")
                  + (f", memory={mem_kb}KB" if mem_kb is not None else "")
              )

          with open("result.txt", "w", encoding="utf-8") as f:
              f.write(result + "\n")
          with open("judge_detail.txt", "w", encoding="utf-8") as f:
              f.write("\n".join(details) + "\n")
          PY

      - name: Update README badge
        if: steps.edited.outputs.edited == 'true'
        shell: bash
        run: |
          RESULT=$(cat result.txt)

          case "$RESULT" in
            AC|WA|TLE|MLE|RE|CE) ;;
            *) exit 0 ;;
          esac

          python3 <<'PY'
          import re

          with open('README.md', 'r', encoding='utf-8') as f:
            data = f.read()

          with open('result.txt', 'r', encoding='utf-8') as f:
            result = f.read().strip()

          new = re.sub(
            r'<!-- JUDGE_BADGE_START -->.*?<!-- JUDGE_BADGE_END -->',
            f'<!-- JUDGE_BADGE_START -->\n![Judge Result](./badges/{result}.svg)\n<!-- JUDGE_BADGE_END -->',
            data,
            flags=re.S,
          )

          with open('README.md', 'w', encoding='utf-8') as f:
            f.write(new)
          PY

      - name: Commit result
        if: steps.edited.outputs.edited == 'true' && (github.ref_name == 'main' || github.ref_name == 'master')
        shell: bash
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ] && [ "${GITHUB_REF_NAME}" != "master" ]; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md result.txt judge_detail.txt
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Update judge result [skip ci]"
          git push

      - name: Create AC record branch
        if: steps.edited.outputs.edited == 'true' && (github.ref_name == 'main' || github.ref_name == 'master')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM_REPO: cydream/00000
          UPSTREAM_BASE_BRANCH: submissions
        run: |
          set -euo pipefail

          RESULT=$(cat result.txt 2>/dev/null || echo "UNKNOWN")
          if [ "$RESULT" != "AC" ]; then
            echo "Result is not AC. Skipping PR creation."
            exit 0
          fi

          USER_NAME="${GITHUB_REPOSITORY_OWNER}"
          FORK_REPO="${GITHUB_REPOSITORY}"
          FORK_BRANCH="${GITHUB_REF_NAME}"
          BRANCH_NAME="ac-record-${USER_NAME}"
          COMMIT_SHA="${GITHUB_SHA}"
          SUBMITTED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          SOURCE_FILE="solution.cpp"
          SOURCE_SHA256=$(sha256sum "$SOURCE_FILE" | awk '{print $1}')

          export USER_NAME FORK_REPO FORK_BRANCH COMMIT_SHA SOURCE_FILE SOURCE_SHA256 SUBMITTED_AT

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 업스트림 submissions 브랜치를 현재 로컬에 가져옴
          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream "https://github.com/${UPSTREAM_REPO}.git"
          else
            git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"
          fi

          git fetch upstream "${UPSTREAM_BASE_BRANCH}"

          # 업스트림 submissions 브랜치를 기준으로 기록 브랜치 생성
          git checkout -B "${BRANCH_NAME}" "upstream/${UPSTREAM_BASE_BRANCH}"
          
          mkdir -p records
          python3 - <<'PY'
          import json
          import os
          
          user_name = os.environ["USER_NAME"]
          fork_repo = os.environ["FORK_REPO"]
          fork_branch = os.environ["FORK_BRANCH"]
          commit_sha = os.environ["COMMIT_SHA"]
          source_file = os.environ["SOURCE_FILE"]
          source_sha256 = os.environ["SOURCE_SHA256"]
          submitted_at = os.environ["SUBMITTED_AT"]
          
          data = {
              "user": user_name,
              "repo": fork_repo,
              "branch": fork_branch,
              "commit": commit_sha,
              "language": "cpp",
              "source_file": source_file,
              "source_sha256": source_sha256,
              "result": "AC",
              "submitted_at": submitted_at,
          }
          
          with open(f"records/{user_name}.json", "w", encoding="utf-8") as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
              f.write("\n")
          PY

          git add "records/${USER_NAME}.json"

          if git diff --cached --quiet; then
            echo "No record changes to commit."
            exit 0
          fi

          git commit -m "Add AC record for ${USER_NAME} [skip ci]"
          git push -f origin "${BRANCH_NAME}"

      - name: Print manual PR link
        if: steps.edited.outputs.edited == 'true' && (github.ref_name == 'main' || github.ref_name == 'master')
        shell: bash
        env:
          UPSTREAM_REPO: cydream/00000
          UPSTREAM_BASE_BRANCH: submissions
        run: |
          set -euo pipefail

          RESULT=$(cat result.txt 2>/dev/null || echo "UNKNOWN")
          if [ "$RESULT" != "AC" ]; then
            echo "Result is not AC. Skipping PR link."
            exit 0
          fi

          USER_NAME="${GITHUB_REPOSITORY_OWNER}"
          BRANCH_NAME="ac-record-${USER_NAME}"
          PR_URL="https://github.com/${UPSTREAM_REPO}/compare/${UPSTREAM_BASE_BRANCH}...${USER_NAME}:${BRANCH_NAME}?expand=1"

          echo "Open this URL to create the PR:"
          echo "${PR_URL}"

          {
            echo "## AC record PR"
            echo
            echo "Your AC record branch has been pushed to your fork."
            echo
            echo "Create the upstream PR here:"
            echo
            echo "${PR_URL}"
          } >> "$GITHUB_STEP_SUMMARY"
